name: Scheduled Telemetry Ingestion Pipeline

on:
  workflow_run:
    workflows: ["Scheduled Environmental Data Pipeline"] # Matches producer workflow name
    types:
      - completed # Only fires once the producer is completely finished

jobs:
  run-consumer:
    runs-on: ubuntu-latest
    # Only execute if the upstream producer run actually succeeded (didn't crash)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # Required so the workflow runner can commit files back into your repository
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Ingestion Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_producer.txt
     
    - name: Extract Secure SSL Credentials from Secrets
      run: |
        mkdir -p ssl_credentials
        echo "${{ secrets.SSL_CA_PEM }}" > ssl_credentials/ca.pem
        echo "${{ secrets.SSL_CERT_PEM }}" > ssl_credentials/service.cert
        echo "${{ secrets.SSL_KEY_PEM }}" > ssl_credentials/service.key
     
    - name: Run Catch-Up Telemetry Ingestion Pipeline
      env:
        KAFKA_BROKER_URI: ${{ secrets.KAFKA_BROKER }}
        POSTGRES_DB_URI: ${{ secrets.POSTGRES_DB_URI }}
      run: |
        mkdir -p pipeline-logs
        python pid_consumer.py
     
    # --- NEW STEP: Capture, stage, and save the persistent logs ---
    - name: Commit and Push Consumer Operational Logs
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage the consumer execution file 
        git add pipeline-logs/consumer_pipeline.log
        
        # Commit the changes, adding a timestamp. '|| true' prevents crash if there's nothing new to push
        git commit -m "Automated Telemetry Log Update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || true
        git push
