name: Scheduled Telemetry Ingestion Pipeline

on:
  schedule:
    # Triggers at exactly minute 15 of hours 13, 15, 17, 19, and 21 UTC (Mon-Fri)
    # This aligns perfectly with your 2-hour producer intervals
    - cron: '15 13,15,17,19,21 * * 1-5'
  workflow_dispatch: # Keeps a manual "Run Now" button active in the Actions tab for testing

jobs:
  run-consumer:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Ingestion Dependencies
      run: |
        python -m pip install --upgrade pip
        # Leverages your consolidated requirements file containing psycopg2-binary and confluent-kafka
        pip install -r requirements_producer.txt

    - name: Extract Secure SSL Credentials from Secrets
      run: |
        mkdir -p ssl_credentials
        echo "${{ secrets.SSL_CA_PEM }}" > ssl_credentials/ca.pem
        echo "${{ secrets.SSL_CERT_PEM }}" > ssl_credentials/service.cert
        echo "${{ secrets.SSL_KEY_PEM }}" > ssl_credentials/service.key

    - name: Run Catch-Up Telemetry Ingestion Pipeline
      env:
        # Maps your core repository secrets securely into the runner's execution session
        KAFKA_BROKER_URI: ${{ secrets.KAFKA_BROKER }}
        POSTGRES_DB_URI: ${{ secrets.POSTGRES_DB_URI }}
      run: |
        python pid_consumer.py