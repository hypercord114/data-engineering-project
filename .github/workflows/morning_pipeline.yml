name: Morning Shift Forecast ELT
on:
  schedule:
    # 8:17 AM UTC maps to 4:17 AM EDT in Buffalo.
    # Shifting away from minute '0' avoids the global peak congestion queue.
    - cron: '17 8 * * 1-5'
  workflow_dispatch: # Allows you to trigger the job manually from the GitHub UI for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-elt:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_morning_pipeline.txt
  
      # Step 1: Run Ingestion Step (Extract & Load)
      # --- FIXED: Directory created HERE so Step 1 script can safely initialize its log handle ---
      - name: Extract Raw JSON Weather Payload
        env:
          POSTGRES_DB_URI: ${{ secrets.POSTGRES_DB_URI }}
        run: |
          mkdir -p pipeline-logs
          python morning_extract_and_load.py

      # Step 2: Run Processing Step (Transform & Load)
      - name: Transform and Populate Target Tables
        env:
          POSTGRES_DB_URI: ${{ secrets.POSTGRES_DB_URI }}
        run: |
          python morning_etl.py

      # Step 3: Run Visualization Step (Generate HTML Presentation Page)
      - name: Regenerate Operational Dashboard File
        run: python generate_dashboard.py

      # Step 4: Track, stage, and save data assets and front-end builds back into GitHub
      - name: Commit and Push Database, Logs & Dashboard Update
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Consolidated tracking line captures raw landing zones, DBs, logs, and Web pages
          git add environmental_data.db pipeline-logs/morning_pipeline.log raw_json/ index.html

          git commit -m "Automated Data Lake, DB & Dashboard Run: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || true
          git push
