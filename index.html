<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operations Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-8">
    <div class="max-w-5xl mx-auto">
        <header class="border-b border-slate-800 pb-4 mb-8">
            <h1 class="text-3xl font-bold text-emerald-400">Shift Environmental Dashboard</h1>
            <p class="text-slate-400 text-sm">Target Tracking Date: <span class="text-slate-200 font-medium">2026-05-22</span></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-md">
                <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Predicted Shift Temp</span>
                <div class="text-3xl font-bold mt-1 text-amber-400">59.6°F</div>
            </div>
            
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-md">
                <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Predicted Wind Path</span>
                <div class="text-3xl font-bold mt-1 text-sky-400">65.4° (ENE)</div>
                <div class="text-xs text-slate-500 mt-0.5">Downwind Exposure Path: WSW</div>
            </div>
            
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-md">
                <span class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Predicted Avg Humidity</span>
                <div class="text-3xl font-bold mt-1 text-indigo-400">41.5%</div>
            </div>
        </div>
    </div>
</body>
</html>
