name: Morning Shift Forecast ELT
on:
  schedule:
    # 8:00 AM UTC maps to exactly 4:00 AM EST / 5:00 AM EDT (Monday - Friday)
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # Allows you to trigger the job manually from the GitHub UI for testing

# Suppresses the Node.js runner deprecation warning cleanly
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-elt:
    runs-on: ubuntu-latest
    
    # Grant permissions to allow the automated GitHub token to write data back to your repo
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up future runs by caching dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 1: Run the Extraction & Loading Phase (EL)
      - name: Extract Raw JSON Weather Payload
        run: python morning_extract_and_load.py

      # Step 2: Run the Processing & Transformation Phase (T)
      - name: Transform and Populate Target Tables
        run: python morning_etl.py

      # Step 3: Track and commit the JSON data lake archive, databases, and logs safely back into GitHub
      - name: Commit and Push Storage Layers
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the database, the new raw_json storage folder, and both log outputs
          git add environmental_data.db morning_pipeline.log raw_json/
          
          # Save snapshot with a timestamp marker or pass silently if no dataset modifications exist
          git commit -m "Automated ELT Run: Data Lake & DB Update $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || true
          git push
