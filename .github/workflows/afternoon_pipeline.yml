name: Afternoon ETL and Dashboard Pipeline

on:
  schedule:
    # Runs at 18:23 UTC daily
    - cron: '23 18 * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  run-afternoon-pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_afternoon_pipeline.txt

      - name: Extract Secure SSL Credentials from Secrets
        run: |
          mkdir -p ssl_credentials
          echo "${{ secrets.SSL_CA_PEM }}" > ssl_credentials/ca.pem
          echo "${{ secrets.SSL_CERT_PEM }}" > ssl_credentials/service.cert
          echo "${{ secrets.SSL_KEY_PEM }}" > ssl_credentials/service.key

      - name: Run Afternoon Extract and Load
        env:
          POSTGRES_DB_URI: ${{ secrets.POSTGRES_DB_URI }}
        run: python afternoon_extract_and_load.py

      - name: Run Afternoon ETL (Transform and Kafka Purge)
        env:
          POSTGRES_DB_URI: ${{ secrets.POSTGRES_DB_URI }}
          KAFKA_BROKER_URI: ${{ secrets.KAFKA_BROKER_URI }}
        run: python afternoon_etl.py

      - name: Run Afternoon Dashboard Generator
        run: python afternoon_generate_dashboard.py

      - name: Commit and Push Updated Dashboard
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html pipeline-logs/afternoon_pipeline.log environmental_data.db raw_json/
          git commit -m "chore: auto-update afternoon dashboard [skip ci]" || echo "No changes to commit"
          git push
