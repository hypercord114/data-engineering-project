name: Scheduled Environmental Data Pipeline

on:
  schedule:
    # Triggers at exactly minute 0 of hours 13, 15, 17, 19, and 21 UTC (Mon-Fri)
    - cron: '0 13,15,17,19,21 * * 1-5'
  workflow_dispatch: # Keeps a manual "Run Now" button active in your GitHub UI for testing

jobs:
  run-stream:
    runs-on: ubuntu-latest

    # Allows GitHub Actions to commit changes back into your repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Pipeline Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_producer.txt
     
    - name: Extract Secure SSL Credentials from Secrets
      run: |
        mkdir -p ssl_credentials
        echo "${{ secrets.SSL_CA_PEM }}" > ssl_credentials/ca.pem
        echo "${{ secrets.SSL_CERT_PEM }}" > ssl_credentials/service.cert
        echo "${{ secrets.SSL_KEY_PEM }}" > ssl_credentials/service.key
     
    - name: Execute Weather Scraping and Send Data Burst to Aiven
      env:
        KAFKA_BROKER_URI: ${{ secrets.KAFKA_BROKER_URI }}
      run: |
        mkdir -p pipeline-logs
        python pid_producer.py

    # --- NEW STEP: Save execution logs to your repository permanently ---
    - name: Commit and Push Producer Operational Logs
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage the new or updated log file
        git add pipeline-logs/kafka_pipeline.log
        
        # Commit the log file with an updated timestamp
        git commit -m "Automated Producer Log Update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || true
        git push
